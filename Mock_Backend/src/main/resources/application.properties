# ===== Server =====
server.port=${PORT:8080}

# ===== Database (H2 for local dev) =====
spring.datasource.url=${DATABASE_URL:jdbc:h2:mem:interviewforge}
spring.datasource.username=${DATABASE_USERNAME:sa}
spring.datasource.password=${DATABASE_PASSWORD:}
spring.datasource.driver-class-name=${DATABASE_DRIVER:org.h2.Driver}

# ===== JPA =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=${HIBERNATE_DIALECT:org.hibernate.dialect.H2Dialect}

# ===== H2 Console (dev only) =====
spring.h2.console.enabled=${H2_CONSOLE:true}
spring.h2.console.path=/h2-console

# ===== JWT =====
app.jwt.secret=${JWT_SECRET:interviewforge-super-secret-key-that-is-at-least-256-bits-long-for-security}
app.jwt.expiration-ms=${JWT_EXPIRATION:86400000}

# ===== CORS =====
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000,http://localhost:5500,http://127.0.0.1:5500,http://localhost:8080}

# ===== SQL Init =====
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true
