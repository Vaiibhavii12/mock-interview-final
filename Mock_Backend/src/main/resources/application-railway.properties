# ===== Railway Production Profile =====
# Activated by setting SPRING_PROFILES_ACTIVE=railway in Railway env vars
# DataSource is configured by RailwayDataSourceConfig.java (parses DATABASE_URL)

# ===== JPA =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# ===== H2 Console (disabled in prod) =====
spring.h2.console.enabled=false

# ===== SQL Init =====
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true
